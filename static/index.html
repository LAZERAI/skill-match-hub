<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKILL MATCH HUB</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
</head>
<body>
    <nav class="nav">
        <div class="logo">Skill Match Hub</div>
        <button id="theme-toggle" class="btn btn-ghost" style="padding: 0.5rem; border: none;"><i class="fa-solid fa-moon"></i></button>
    </nav>

    <main class="container">
        <!-- Landing -->
        <section id="landing-view" class="view active">
            <div class="hero">
                <h1>MATCH<br>TALENT<br>SMARTER.</h1>
                <p style="color: var(--muted); margin-top: 2rem; font-weight: 600;">AI-powered semantic analysis for the modern workforce.</p>
            </div>

            <div class="role-selector">
                <div class="role-option" onclick="app.switchView('recruiter')">
                    <h2>RECRUITER</h2>
                    <p style="color: var(--muted);">Find top-tier candidates with semantic precision.</p>
                    <i class="fa-solid fa-arrow-right" style="margin-top: auto; align-self: flex-end;"></i>
                </div>
                <div class="role-option" onclick="app.switchView('seeker')">
                    <h2>JOB SEEKER</h2>
                    <p style="color: var(--muted);">Navigate your career with AI-backed matching.</p>
                    <i class="fa-solid fa-arrow-right" style="margin-top: auto; align-self: flex-end;"></i>
                </div>
            </div>
        </section>

        <!-- Recruiter -->
        <section id="recruiter-view" class="view">
            <div style="display: flex; justify-content: space-between; align-items: baseline;">
                <h2 style="font-size: 3rem; letter-spacing: -0.04em;">RECRUITER_DASH</h2>
                <button class="btn btn-ghost" onclick="app.switchView('landing')">EXIT</button>
            </div>

            <div class="input-area">
                <textarea id="jd-input" placeholder="PASTE_JOB_DESCRIPTION // CTRL + ENTER TO EXECUTE"></textarea>
                <div class="controls">
                    <button class="btn" onclick="app.searchCandidates()">EXECUTE_SEARCH</button>
                    <label class="btn btn-ghost">
                        UPLOAD_PDF
                        <input type="file" accept=".pdf,.txt" hidden onchange="app.handleFileUpload(event, 'jd-input')">
                    </label>
                    <button class="btn btn-ghost" onclick="app.clearSearch('recruiter')">CLEAR</button>
                </div>
            </div>

            <div id="recruiter-results" class="results-grid"></div>
        </section>

        <!-- Seeker -->
        <section id="seeker-view" class="view">
            <div style="display: flex; justify-content: space-between; align-items: baseline;">
                <h2 style="font-size: 3rem; letter-spacing: -0.04em;">SEEKER_DASH</h2>
                <button class="btn btn-ghost" onclick="app.switchView('landing')">EXIT</button>
            </div>

            <div class="input-area">
                <textarea id="resume-input" placeholder="PASTE_RESUME_TEXT // CTRL + ENTER TO EXECUTE"></textarea>
                <div class="controls">
                    <button class="btn" onclick="app.searchJobs()">EXECUTE_SEARCH</button>
                    <label class="btn btn-ghost">
                        UPLOAD_PDF
                        <input type="file" accept=".pdf,.txt" hidden onchange="app.handleFileUpload(event, 'resume-input')">
                    </label>
                    <button class="btn btn-ghost" onclick="app.clearSearch('seeker')">CLEAR</button>
                </div>
            </div>

            <div id="seeker-results" class="results-grid"></div>
        </section>
    </main>

    <div id="loading-overlay" class="hidden">
        <div class="spinner"></div>
        <p style="font-family: 'Geist Mono', monospace; font-size: 0.8rem; letter-spacing: 0.1em;">INITIATING_AI_ANALYSIS...</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
