<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Match Hub | AI Talent Connector</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
</head>
<body>
    <div class="mesh-bg">
        <div class="blob"></div>
        <div class="blob"></div>
    </div>

    <nav class="navbar">
        <div class="logo">
            <i class="fa-solid fa-cube"></i>
            <span>Skill Match Hub</span>
        </div>
        <button id="theme-toggle" class="icon-btn">
            <i class="fa-solid fa-moon"></i>
        </button>
    </nav>

    <main class="container">
        <!-- Landing View -->
        <section id="landing-view" class="view active">
            <div style="text-align: center; margin-top: 5rem;">
                <h1 style="font-size: 4rem; font-weight: 800; letter-spacing: -0.04em; margin-bottom: 1rem;">
                    Match Talent <span style="color: var(--primary)">Smarter.</span>
                </h1>
                <p style="color: var(--text-muted); font-size: 1.25rem; max-width: 600px; margin: 0 auto;">
                    AI-powered semantic search for the modern workforce.
                </p>
            </div>

            <div class="role-grid">
                <div class="role-card" onclick="app.switchView('recruiter')">
                    <i class="fa-solid fa-rocket"></i>
                    <h2>Recruiter</h2>
                    <p style="color: var(--text-muted); margin-top: 1rem;">Find top-tier candidates with precision mapping.</p>
                </div>
                <div class="role-card" onclick="app.switchView('seeker')">
                    <i class="fa-solid fa-compass"></i>
                    <h2>Job Seeker</h2>
                    <p style="color: var(--text-muted); margin-top: 1rem;">Navigate your career with AI-backed job matching.</p>
                </div>
            </div>
        </section>

        <!-- Recruiter View -->
        <section id="recruiter-view" class="view hidden">
            <div style="margin-bottom: 2rem; display: flex; align-items: center; gap: 1rem;">
                <button class="ghost-btn" onclick="app.switchView('landing')">
                    <i class="fa-solid fa-chevron-left"></i> Back
                </button>
                <h2 style="font-weight: 800;">Recruiter Dashboard</h2>
            </div>

            <div class="glass-box">
                <label style="font-weight: 700; margin-bottom: 0.5rem; display: block;">Paste Job Description</label>
                <textarea id="jd-input" placeholder="We are looking for a... (Press Ctrl + Enter to search)"></textarea>
                <div class="action-bar">
                    <button class="btn-primary" onclick="app.searchCandidates()">Find Candidates</button>
                    <label class="btn-secondary">
                        <i class="fa-solid fa-file-pdf"></i> Upload PDF
                        <input type="file" id="jd-file" accept=".pdf,.txt" hidden onchange="app.handleFileUpload(event, 'jd-input')">
                    </label>
                    <button class="ghost-btn" onclick="app.clearSearch('recruiter')">Clear</button>
                </div>
            </div>

            <div id="recruiter-results"></div>
        </section>

        <!-- Seeker View -->
        <section id="seeker-view" class="view hidden">
            <div style="margin-bottom: 2rem; display: flex; align-items: center; gap: 1rem;">
                <button class="ghost-btn" onclick="app.switchView('landing')">
                    <i class="fa-solid fa-chevron-left"></i> Back
                </button>
                <h2 style="font-weight: 800;">Job Seeker Dashboard</h2>
            </div>

            <div class="glass-box">
                <label style="font-weight: 700; margin-bottom: 0.5rem; display: block;">Paste Resume Text</label>
                <textarea id="resume-input" placeholder="Experience: Senior dev... (Press Ctrl + Enter to search)"></textarea>
                <div class="action-bar">
                    <button class="btn-primary" onclick="app.searchJobs()">Find Jobs</button>
                    <label class="btn-secondary">
                        <i class="fa-solid fa-file-pdf"></i> Upload PDF
                        <input type="file" id="resume-file" accept=".pdf,.txt" hidden onchange="app.handleFileUpload(event, 'resume-input')">
                    </label>
                    <button class="ghost-btn" onclick="app.clearSearch('seeker')">Clear</button>
                </div>
            </div>

            <div id="seeker-results"></div>
        </section>
    </main>

    <div id="loading-overlay" class="hidden">
        <div class="spinner"></div>
        <p style="margin-top: 1rem; font-weight: 600;">Processing...</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
