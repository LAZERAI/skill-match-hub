<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Match Hub | AI Recruitment Platform</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <i class="fa-solid fa-network-wired"></i>
            <span>Skill Match Hub</span>
        </div>
        <div class="nav-controls">
            <button id="theme-toggle" class="icon-btn" title="Toggle Theme">
                <i class="fa-solid fa-moon"></i>
            </button>
        </div>
    </nav>

    <main class="container">
        <!-- View 1: Landing / Role Selection -->
        <section id="landing-view" class="view active">
            <div class="hero-text">
                <h1>Find your perfect match.</h1>
                <p>AI-powered semantic search connecting talent with opportunity.</p>
            </div>
            
            <div class="role-cards">
                <div class="card role-card" onclick="app.switchView('recruiter')">
                    <div class="icon-wrapper recruiter-icon">
                        <i class="fa-solid fa-briefcase"></i>
                    </div>
                    <h2>I'm a Recruiter</h2>
                    <p>Find top talent by pasting your job description.</p>
                </div>

                <div class="card role-card" onclick="app.switchView('seeker')">
                    <div class="icon-wrapper seeker-icon">
                        <i class="fa-solid fa-user-tie"></i>
                    </div>
                    <h2>I'm a Job Seeker</h2>
                    <p>Find dream jobs by analyzing your resume.</p>
                </div>
            </div>
        </section>

        <!-- View 2: Recruiter Dashboard -->
        <section id="recruiter-view" class="view hidden">
            <div class="dashboard-header">
                <button class="back-btn" onclick="app.switchView('landing')">
                    <i class="fa-solid fa-arrow-left"></i> Back
                </button>
                <h2>Recruiter Dashboard</h2>
            </div>

            <div class="search-box">
                <label for="jd-input">Paste Job Description</label>
                <textarea id="jd-input" placeholder="e.g. We are looking for a Senior Python Developer with experience in FastAPI and Machine Learning..."></textarea>
                <button class="primary-btn" onclick="app.searchCandidates()">
                    <i class="fa-solid fa-search"></i> Find Candidates
                </button>
            </div>

            <div id="recruiter-results" class="results-container">
                <!-- Results will be injected here -->
            </div>
        </section>

        <!-- View 3: Seeker Dashboard -->
        <section id="seeker-view" class="view hidden">
            <div class="dashboard-header">
                <button class="back-btn" onclick="app.switchView('landing')">
                    <i class="fa-solid fa-arrow-left"></i> Back
                </button>
                <h2>Job Seeker Dashboard</h2>
            </div>

            <div class="search-box">
                <label for="resume-input">Paste Resume / CV Text</label>
                <textarea id="resume-input" placeholder="e.g. John Doe. Experienced Software Engineer with 5 years in..."></textarea>
                <button class="primary-btn" onclick="app.searchJobs()">
                    <i class="fa-solid fa-briefcase"></i> Find Jobs
                </button>
            </div>

            <div id="seeker-results" class="results-container">
                <!-- Results will be injected here -->
            </div>
        </section>
    </main>

    <div id="loading-overlay" class="hidden">
        <div class="spinner"></div>
        <p>Analyzing with AI...</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
